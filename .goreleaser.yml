version: 2

project_name: procs

before:
  hooks:
    - go mod tidy

builds:
  - id: procs
    main: ./cmd/procs
    binary: procs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    name_template: "procs_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - examples/**

checksum:
  name_template: "procs_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
